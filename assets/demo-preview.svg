    <text x="95" y="181" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#C2410C">campaign</text>
    <rect x="24" y="208" width="142" height="32" rx="8" fill="#FAF5FF"/>
    <text x="95" y="229" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#6D28D9">evidence</text>
  </g>
