    <text x="24" y="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#17201D">tech-route.json</text>
    <text x="24" y="72" font-family="Consolas, monospace" font-size="13" fill="#475569">{</text>
    <text x="42" y="98" font-family="Consolas, monospace" font-size="13" fill="#475569">"stages": [...],</text>
    <text x="42" y="124" font-family="Consolas, monospace" font-size="13" fill="#475569">"edges": [...],</text>
    <text x="42" y="150" font-family="Consolas, monospace" font-size="13" fill="#475569">"layout": "ai-pipeline",</text>
    <text x="42" y="176" font-family="Consolas, monospace" font-size="13" fill="#475569">"style": "premium"</text>
    <text x="24" y="202" font-family="Consolas, monospace" font-size="13" fill="#475569">}</text>
    <rect x="24" y="222" width="202" height="30" rx="15" fill="#315C61"/>
    <text x="125" y="242" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">source of truth</text>
  </g>
