<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sample Project Technical Route</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: #1f2937; background: #f8fafc; }
    .wrap { display: grid; grid-template-columns: minmax(0, 1fr) 340px; min-height: 100vh; }
    .diagram { overflow: auto; padding: 24px; background: #ffffff; }
    .panel { border-left: 1px solid #e5e7eb; padding: 20px; background: #f8fafc; }

    .panel p { line-height: 1.45; }
    .evidence { margin-top: 12px; padding: 10px; border: 1px solid #e5e7eb; background: #fff; border-radius: 8px; }
    .muted { color: #64748b; font-size: 13px; }
    svg { max-width: none; }
  </style>
</head>
<body>
<div class="wrap">

<rect width="100%" height="100%" fill="#FFFFFF"/>

<rect x="902.0" y="134.0" width="228.0" height="206.0" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>

<rect x="1184.0" y="134.0" width="228.0" height="206.0" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>

<line x1="1016.0" y1="219.0" x2="1298.0" y2="219.0" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)" opacity="0.78"/>

<rect x="81.0" y="190.0" width="178.0" height="58.0" rx="9" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/>
<text x="170.0" y="217.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">Define project</text>
<text x="170.0" y="232.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">goal</text>
</g>
<g class="node" data-node="input_sources" style="cursor:pointer">
<rect x="363.0" y="190.0" width="178.0" height="58.0" rx="9" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/>
<text x="452.0" y="217.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">Collect source</text>
<text x="452.0" y="232.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">evidence</text>
</g>
<g class="node" data-node="method_extract" style="cursor:pointer">
<rect x="645.0" y="190.0" width="178.0" height="58.0" rx="9" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/>

</g>

<text x="734.0" y="306.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">files</text>
</g>
<g class="node" data-node="validation_check" style="cursor:pointer">
<rect x="927.0" y="190.0" width="178.0" height="58.0" rx="9" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/>
<text x="1016.0" y="217.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">Check route</text>
<text x="1016.0" y="232.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">quality</text>
</g>
<g class="node" data-node="output_files" style="cursor:pointer">
<rect x="1209.0" y="190.0" width="178.0" height="58.0" rx="9" fill="#FFFFFF" stroke="#60A5FA" stroke-width="1.6"/>
<text x="1298.0" y="217.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">Deliver editable</text>
<text x="1298.0" y="232.0" text-anchor="middle" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#1F2937">diagrams</text>
</g>
</svg></main>
  <aside class="panel">
    <h2 id="node-title">Select a node</h2>
    <p id="node-detail" class="muted">Click any diagram node to inspect its detail and evidence.</p>
    <div id="node-evidence"></div>
  </aside>
</div>
<script>
const route = {"title": "Sample Project Technical Route", "subtitle": "Editable route diagram generated from structured evidence", "layout": "horizontal-stages", "style": "academic-blue", "metadata": {"source_scope": "examples/sample-project", "generated_by": "tech-route-maker", "selected_output_formats": ["pptx", "svg", "drawio", "mermaid"]}, "stages": [{"id": "objective", "title": "Objective", "summary": "", "nodes": [{"id": "objective_goal", "label": "Define project goal", "detail": "Clarify the problem, audience, and expected technical result.", "tag": "objective", "evidence": [{"kind": "file", "path": "README.md", "note": "Project overview"}]}]}, {"id": "input", "title": "Input", "summary": "", "nodes": [{"id": "input_sources", "label": "Collect source evidence", "detail": "Read documents, configuration files, and source directories.", "tag": "input", "evidence": [{"kind": "file", "path": "docs/", "note": "Project documentation"}]}]}, {"id": "method", "title": "Method", "summary": "", "nodes": [{"id": "method_extract", "label": "Extract route stages", "detail": "Convert evidence into objective, input, method, validation, and output nodes.", "tag": "method", "evidence": [{"kind": "inference", "note": "Derived from repository scan pattern"}]}, {"id": "method_render", "label": "Render editable files", "detail": "Render the same JSON route into selected editable formats.", "tag": "implementation", "evidence": [{"kind": "file", "path": "scripts/", "note": "Renderer scripts"}]}]}, {"id": "validation", "title": "Validation", "summary": "", "nodes": [{"id": "validation_check", "label": "Check route quality", "detail": "Validate IDs, evidence, edge endpoints, and selected output formats.", "tag": "validation", "evidence": [{"kind": "file", "path": "scripts/validate_route.py", "note": "Validation script"}]}]}, {"id": "output", "title": "Output", "summary": "", "nodes": [{"id": "output_files", "label": "Deliver editable diagrams", "detail": "Provide PPTX, SVG, Draw.io, Excalidraw, Mermaid, HTML, Markdown, or JSON based on user choices.", "tag": "output", "evidence": [{"kind": "file", "path": "outputs/", "note": "Selected output files"}]}]}], "edges": [{"id": "edge_1", "from": "objective_goal", "to": "input_sources", "label": "guides", "kind": "flow", "valid": true}, {"id": "edge_2", "from": "input_sources", "to": "method_extract", "label": "feeds", "kind": "flow", "valid": true}, {"id": "edge_3", "from": "method_extract", "to": "method_render", "label": "structures", "kind": "flow", "valid": true}, {"id": "edge_4", "from": "method_render", "to": "validation_check", "label": "checks", "kind": "flow", "valid": true}, {"id": "edge_5", "from": "validation_check", "to": "output_files", "label": "delivers", "kind": "flow", "valid": true}]};
const nodes = {};
for (const stage of route.stages) {
  for (const node of stage.nodes) {
    nodes[node.id] = node;
  }
}
document.querySelectorAll("[data-node]").forEach(el => {
  el.addEventListener("click", () => {
    const node = nodes[el.dataset.node];
    if (!node) return;
    document.getElementById("node-title").textContent = node.label;
    document.getElementById("node-detail").textContent = node.detail || "No detail recorded.";
    const evidence = node.evidence || [];
    document.getElementById("node-evidence").innerHTML = evidence.map(item => {
      const path = item.path ? `<div><b>Path:</b> ${item.path}</div>` : "";
      const symbol = item.symbol ? `<div><b>Symbol:</b> ${item.symbol}</div>` : "";
      const note = item.note ? `<div><b>Note:</b> ${item.note}</div>` : "";
      return `<div class="evidence"><div><b>Kind:</b> ${item.kind || "unknown"}</div>${path}${symbol}${note}</div>`;
    }).join("") || '<p class="muted">No evidence recorded.</p>';
  });
});
</script>
</body>
</html>
