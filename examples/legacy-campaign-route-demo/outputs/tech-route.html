      return `<div class="evidence"><div><b>Kind:</b> ${item.kind || "unknown"}</div>${path}${symbol}${note}</div>`;
    }).join("") || '<p class="muted">No evidence recorded.</p>';
  });
});
</script>
</body>
</html>
